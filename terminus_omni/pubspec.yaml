name: terminus_omni
description: >
  TERMINUS-OMNI — The Inevitability Engine.
  AI-Assisted Narrative Sublimation of Complex Trauma.
  Hybrid Syndicate / Ethic Software Foundation.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Google Gemini AI
  google_generative_ai: ^0.4.6

  # Local encrypted storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio recording for vocal testament
  record: ^5.0.5
  audioplayers: ^6.0.0

  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
    - family: ShareTechMono
      fonts:
        - asset: assets/fonts/ShareTechMono-Regular.ttf
