<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGIL | Hybrid Syndicate</title>
    <meta name="description" content="SIGIL — Hybrid Syndicate Ethic Software Foundation. We Don't Build Apps. We Build Cognitive Weapons.">
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Orbitron:wght@400;500;600;700;900&family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000000;
            --green: #39ff14;
            --green-dim: #1a7a0a;
            --cyan: #00f0ff;
            --amber: #ffbf00;
            --purple: #9d00ff;
            --red: #ff3344;
            --white: #ffffff;
            --text: #c8d0d8;
            --text-dim: #4a5568;
            --text-dark: #2d3748;
            --border: #1c2633;
        }

        body {
            font-family: 'Share Tech Mono', 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== BOOT SCREEN ===== */
        #bootScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s;
        }

        #bootScreen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .boot-container {
            max-width: 620px;
            width: 90%;
        }

        .boot-lines {
            min-height: 200px;
        }

        .boot-line {
            font-size: 0.78rem;
            color: var(--green);
            margin-bottom: 5px;
            opacity: 0;
            transform: translateX(-8px);
            transition: opacity 0.3s, transform 0.3s;
            letter-spacing: 0.03em;
        }

        .boot-line.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .boot-line.amber { color: var(--amber); }
        .boot-line.cyan { color: var(--cyan); }
        .boot-line.purple { color: var(--purple); }
        .boot-line.red { color: var(--red); }
        .boot-line.dim { color: var(--text-dim); }
        .boot-line.bold { font-weight: 600; }
        .boot-line.white { color: var(--white); }

        .boot-progress {
            margin-top: 24px;
            height: 2px;
            background: #111;
            border-radius: 1px;
            overflow: hidden;
        }

        .boot-progress-fill {
            height: 100%;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            width: 0%;
            transition: width 0.3s;
        }

        /* ===== SIGIL SCREEN (main) ===== */
        #sigilScreen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #sigilScreen.active {
            display: flex;
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
        }

        /* Vignette */
        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
        }

        /* ===== EMBLEM ===== */
        .emblem-wrap {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 40px;
        }

        .emblem-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(57,255,20,0.08) 0%, transparent 70%);
            animation: emblemPulse 4s ease-in-out infinite;
        }

        .emblem-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 290px;
            height: 290px;
            border-radius: 50%;
            border: 1px solid rgba(57,255,20,0.12);
            animation: ringRotate 30s linear infinite;
        }

        .emblem-ring::before {
            content: '';
            position: absolute;
            top: -3px; left: 50%;
            transform: translateX(-50%);
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--green);
        }

        .emblem-ring-2 {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 310px;
            height: 310px;
            border-radius: 50%;
            border: 1px solid rgba(0,240,255,0.06);
            animation: ringRotate 45s linear infinite reverse;
        }

        .emblem-ring-2::before {
            content: '';
            position: absolute;
            bottom: -3px; left: 50%;
            transform: translateX(-50%);
            width: 4px; height: 4px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--cyan);
        }

        .emblem-img {
            position: relative;
            width: 280px;
            height: 280px;
            z-index: 2;
            opacity: 0;
            animation: emblemReveal 2s ease-out forwards;
            animation-delay: 0.5s;
        }

        /* Glitch effect on emblem */
        .emblem-glitch {
            position: absolute;
            top: 0; left: 0;
            width: 280px;
            height: 280px;
            z-index: 3;
            opacity: 0;
            pointer-events: none;
        }

        .emblem-wrap:hover .emblem-glitch {
            animation: emblemGlitch 0.3s steps(2) forwards;
        }

        /* ===== SIGIL TITLE ===== */
        .sigil-title {
            font-family: 'Orbitron', monospace;
            font-size: 4.5rem;
            font-weight: 900;
            color: var(--green);
            letter-spacing: 0.35em;
            text-shadow:
                0 0 40px rgba(57,255,20,0.4),
                0 0 80px rgba(57,255,20,0.15),
                0 0 120px rgba(57,255,20,0.05);
            margin-bottom: 8px;
            opacity: 0;
            animation: titleReveal 1.5s ease-out forwards;
            animation-delay: 1.2s;
            position: relative;
            z-index: 2;
        }

        .sigil-sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: 60px;
            opacity: 0;
            animation: titleReveal 1s ease-out forwards;
            animation-delay: 1.8s;
            position: relative;
            z-index: 2;
        }

        /* ===== NAVIGATION HUB ===== */
        .nav-hub {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 700px;
            width: 90%;
            opacity: 0;
            animation: hubReveal 1.2s ease-out forwards;
            animation-delay: 2.4s;
            position: relative;
            z-index: 2;
        }

        .nav-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: rgba(255,255,255,0.01);
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .nav-node::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(57,255,20,0.03), transparent);
            transition: left 0.5s;
        }

        .nav-node:hover::before { left: 100%; }

        .nav-node:hover {
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(57,255,20,0.08), inset 0 0 20px rgba(57,255,20,0.02);
        }

        .nav-node-name {
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 4px;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .nav-node-desc {
            font-size: 0.5rem;
            color: var(--text-dark);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Node color themes */
        .nav-node.oracle .nav-node-name { color: var(--cyan); }
        .nav-node.oracle:hover { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,240,255,0.08); }

        .nav-node.pneuma .nav-node-name { color: var(--green); }
        .nav-node.pneuma:hover { border-color: var(--green); }

        .nav-node.chronos .nav-node-name { color: #00d4aa; }
        .nav-node.chronos:hover { border-color: #00d4aa; box-shadow: 0 0 20px rgba(0,212,170,0.08); }

        .nav-node.agora .nav-node-name { color: var(--green); }
        .nav-node.agora:hover { border-color: var(--green); }

        .nav-node.archivio .nav-node-name { color: var(--cyan); }
        .nav-node.archivio:hover { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,240,255,0.08); }

        .nav-node.eei .nav-node-name { color: var(--red); }
        .nav-node.eei:hover { border-color: var(--red); box-shadow: 0 0 20px rgba(255,51,68,0.08); }

        .nav-node.mandeb .nav-node-name { color: #ff8833; }
        .nav-node.mandeb:hover { border-color: #ff8833; box-shadow: 0 0 20px rgba(255,136,51,0.08); }

        .nav-node.dashboard .nav-node-name { color: var(--amber); }
        .nav-node.dashboard:hover { border-color: var(--amber); box-shadow: 0 0 20px rgba(255,191,0,0.08); }

        /* ===== FOOTER LINE ===== */
        .sigil-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 8px 24px;
            font-size: 0.5rem;
            color: var(--text-dark);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            z-index: 2;
            opacity: 0;
            animation: titleReveal 1s ease-out forwards;
            animation-delay: 3s;
        }

        .sigil-footer .sf-green { color: rgba(57,255,20,0.3); }

        /* ===== MANIFESTO LINK ===== */
        .manifesto-link {
            margin-top: 30px;
            opacity: 0;
            animation: titleReveal 1s ease-out forwards;
            animation-delay: 2.8s;
            position: relative;
            z-index: 2;
        }

        .manifesto-link a {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-dark);
            text-decoration: none;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 2px;
            transition: all 0.4s;
        }

        .manifesto-link a:hover {
            color: var(--text-dim);
            border-color: rgba(255,255,255,0.15);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes emblemReveal {
            0% {
                opacity: 0;
                transform: scale(0.85);
                filter: brightness(0) blur(8px);
            }
            40% {
                opacity: 0.6;
                filter: brightness(1.5) blur(2px);
            }
            70% {
                filter: brightness(1.2) blur(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: brightness(1) blur(0);
            }
        }

        @keyframes emblemPulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%,-50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%,-50%) scale(1.05); }
        }

        @keyframes ringRotate {
            0% { transform: translate(-50%,-50%) rotate(0deg); }
            100% { transform: translate(-50%,-50%) rotate(360deg); }
        }

        @keyframes titleReveal {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes hubReveal {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes emblemGlitch {
            0% { opacity: 0.7; transform: translate(-3px, 1px); filter: hue-rotate(90deg); }
            50% { opacity: 0.5; transform: translate(3px, -1px); filter: hue-rotate(-90deg); }
            100% { opacity: 0; transform: translate(0,0); }
        }

        @keyframes scanPulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.06; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .sigil-title { font-size: 2.8rem; letter-spacing: 0.2em; }
            .nav-hub { grid-template-columns: repeat(2, 1fr); max-width: 400px; }
            .emblem-wrap { width: 200px; height: 200px; }
            .emblem-img { width: 200px; height: 200px; }
            .emblem-glitch { width: 200px; height: 200px; }
            .emblem-ring { width: 210px; height: 210px; }
            .emblem-ring-2 { width: 230px; height: 230px; }
            .emblem-glow { width: 240px; height: 240px; }
        }

        @media (max-width: 400px) {
            .sigil-title { font-size: 2rem; }
            .nav-hub { grid-template-columns: 1fr 1fr; gap: 8px; }
        }
    </style>
</head>

<script>
// ===== BOOT SEQUENCE =====
const BOOT = [
    { t: 'HYBRID SYNDICATE KERNEL v7.0', c: 'bold' },
    { t: 'Initializing secure environment...', c: '' },
    { t: '', c: '' },
    { t: 'LOADING CORE: identity.js ............ OK', c: '' },
    { t: 'LOADING CORE: circulation.js ......... OK', c: '' },
    { t: 'LOADING CORE: archivio-silente.js .... OK', c: 'cyan' },
    { t: 'LOADING CORE: deliberation-engine.js . OK', c: 'purple' },
    { t: '', c: '' },
    { t: 'REGISTERING ORGANS:', c: 'dim' },
    { t: '  [01] ORACLE .............. planetary intelligence', c: 'cyan' },
    { t: '  [02] PNEUMA .............. local sanctuary', c: '' },
    { t: '  [03] CHRONOS ............. urban simulation', c: '' },
    { t: '  [04] AGORA ............... multi-core deliberation', c: '' },
    { t: '  [05] ARCHIVIO ............ immutable memory', c: 'cyan' },
    { t: '  [06] EEI ................. regulatory forecast', c: 'red' },
    { t: '  [07] BAB-EL-MANDEB ....... escalation monitor', c: 'amber' },
    { t: '', c: '' },
    { t: 'Mounting BroadcastChannel... HYBRID-SYNDICATE', c: 'dim' },
    { t: 'WorldState: bias[4D] initialized', c: 'dim' },
    { t: 'Arena: 16 cores allocated', c: 'dim' },
    { t: '', c: '' },
    { t: 'ALL SYSTEMS NOMINAL.', c: 'bold' },
    { t: '', c: '' },
    { t: 'TRANSFERRING CONTROL TO SIGIL.', c: 'white bold' },
];

function runBoot() {
    const container = document.getElementById('bootLines');
    const bar = document.getElementById('bootProgress');
    let i = 0;

    function next() {
        if (i >= BOOT.length) {
            bar.style.width = '100%';
            setTimeout(() => {
                document.getElementById('bootScreen').classList.add('fade-out');
                setTimeout(() => {
                    document.getElementById('bootScreen').style.display = 'none';
                    document.getElementById('sigilScreen').classList.add('active');
                }, 1000);
            }, 500);
            return;
        }

        const line = BOOT[i];
        const el = document.createElement('div');
        el.className = 'boot-line ' + (line.c || '');
        el.textContent = line.t || '\u00A0';
        container.appendChild(el);

        requestAnimationFrame(() => el.classList.add('visible'));

        bar.style.width = ((i + 1) / BOOT.length * 100) + '%';
        i++;

        const delay = line.t === '' ? 80 : (120 + Math.random() * 140);
        setTimeout(next, delay);
    }

    setTimeout(next, 600);
}

runBoot();
</script>
