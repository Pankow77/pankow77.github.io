name: Deploy TERMINUS-OMNI Web

on:
  workflow_dispatch:
    # Manual trigger from GitHub UI — works from tablet browser

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter version check
        run: flutter --version

      - name: Download Google Fonts
        run: |
          mkdir -p terminus_omni/assets/fonts

          # Download Orbitron
          curl -fsSL "https://github.com/google/fonts/raw/main/ofl/orbitron/static/Orbitron-Regular.ttf" \
            -o terminus_omni/assets/fonts/Orbitron-Regular.ttf
          curl -fsSL "https://github.com/google/fonts/raw/main/ofl/orbitron/static/Orbitron-Bold.ttf" \
            -o terminus_omni/assets/fonts/Orbitron-Bold.ttf

          # Download Share Tech Mono
          curl -fsSL "https://github.com/google/fonts/raw/main/ofl/sharetechmono/ShareTechMono-Regular.ttf" \
            -o terminus_omni/assets/fonts/ShareTechMono-Regular.ttf

          echo "--- Downloaded fonts ---"
          ls -la terminus_omni/assets/fonts/

      - name: Generate web platform
        working-directory: terminus_omni
        run: |
          flutter create --platforms=web .
          flutter pub get

      - name: Build Flutter web
        working-directory: terminus_omni
        run: flutter build web --release --base-href /terminus-omni/

      - name: Assemble full site
        run: |
          mkdir -p _site

          # Copy existing site content
          for item in *.html css js img data docs game hub.html *.png *.svg; do
            if [ -e "$item" ]; then
              cp -r "$item" _site/
            fi
          done

          # Add Flutter web build
          cp -r terminus_omni/build/web _site/terminus-omni

          echo "=== Site root ==="
          ls -la _site/
          echo "=== TERMINUS-OMNI app ==="
          ls -la _site/terminus-omni/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
